# fly.toml app configuration file generated for fs-pokedex-summer-fog-1206 on 2026-07-22T12:39:13+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fs-pokedex-summer-fog-1206'
primary_region = 'sjc'

[build]

[env]
  PORT="5001"

[processes]
  app = "node app.js"

[deploy]
  strategy = "canary"
  
[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
